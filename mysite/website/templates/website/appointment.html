{% extends 'website/base.html' %}
{% block content %}

<section class="appointment">

    <h1>
        {% if appointment %}ویرایش نوبت{% else %}رزرو نوبت داکتر{% endif %}
    </h1>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="patient_name"
               value="{{ appointment.patient_name|default:'' }}"
               placeholder="نام مریض" required>

        <input type="text" name="phone"
               value="{{ appointment.phone|default:'' }}"
               placeholder="شماره تماس" required>

        <select name="doctor" required>
            <option value="">انتخاب داکتر</option>
            {% for d in doctors %}
                <option value="{{ d.id }}"
                {% if appointment.doctor.id == d.id %}selected{% endif %}>
                    {{ d.name }} - {{ d.specialty }}
                </option>
            {% endfor %}
        </select>

        <input type="date" name="date"
               value="{{ appointment.date|default:'' }}" required>

        <input type="time" name="time"
               value="{{ appointment.time|default:'' }}" required>

        <textarea name="reason" rows="4"
                  placeholder="علت مراجعه">{{ appointment.reason|default:'' }}</textarea>

        <button type="submit">
            {% if appointment %}آپدیت نوبت{% else %}ثبت نوبت{% endif %}
        </button>

    </form>

</section>

{% endblock %}
